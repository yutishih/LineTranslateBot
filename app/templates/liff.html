<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>語言設定</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 28px 24px;
      width: 100%;
      max-width: 420px;
    }
    .profile {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }
    .display-name { font-weight: 600; font-size: 16px; color: #333; }
    h2 {
      font-size: 18px;
      color: #06c755;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: 500; }
    .field { margin-bottom: 18px; }
    select, input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      color: #333;
      background: #fafafa;
      transition: border-color 0.2s;
    }
    select:focus, input[type="text"]:focus {
      outline: none;
      border-color: #06c755;
      background: #fff;
    }
    .custom-input { margin-top: 8px; display: none; }
    .custom-input.visible { display: block; }
    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #06c755;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    button[type="submit"]:hover { background: #05b44a; }
    button[type="submit"]:disabled { background: #aaa; cursor: not-allowed; }
    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    .message.ok { background: #e6f9ee; color: #1a8a3d; display: block; }
    .message.error { background: #fdecea; color: #c0392b; display: block; }
    .loading {
      text-align: center;
      padding: 40px 0;
      color: #888;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading" class="loading">載入中…</div>

    <div id="app" style="display:none">
      <div class="profile">
        <img id="avatar" class="avatar" src="" alt="avatar" />
        <span id="display-name" class="display-name"></span>
      </div>

      <h2>🌐 語言設定</h2>

      <!-- GROUP form: single language -->
      <form id="form-group" style="display:none">
        <div class="field">
          <label for="lang-group">我的語言</label>
          <select id="lang-group" onchange="toggleCustom('lang-group','custom-group')">
            <option value="">── 請選擇 ──</option>
            <option>中文（繁體）</option>
            <option>中文（簡體）</option>
            <option>English</option>
            <option>日本語</option>
            <option>한국어</option>
            <option>Français</option>
            <option>Deutsch</option>
            <option>Español</option>
            <option>Português</option>
            <option>ภาษาไทย</option>
            <option>Bahasa Indonesia</option>
            <option>Tiếng Việt</option>
            <option value="__other__">其他（自行輸入）</option>
          </select>
          <input type="text" id="custom-group" class="custom-input" placeholder="請輸入語言名稱" />
        </div>
        <button type="submit">確認設定</button>
      </form>

      <!-- 1-on-1 form: two languages -->
      <form id="form-solo" style="display:none">
        <div class="field">
          <label for="lang1-solo">語言 1</label>
          <select id="lang1-solo" onchange="toggleCustom('lang1-solo','custom-solo1')">
            <option value="">── 請選擇 ──</option>
            <option>中文（繁體）</option>
            <option>中文（簡體）</option>
            <option>English</option>
            <option>日本語</option>
            <option>한국어</option>
            <option>Français</option>
            <option>Deutsch</option>
            <option>Español</option>
            <option>Português</option>
            <option>ภาษาไทย</option>
            <option>Bahasa Indonesia</option>
            <option>Tiếng Việt</option>
            <option value="__other__">其他（自行輸入）</option>
          </select>
          <input type="text" id="custom-solo1" class="custom-input" placeholder="請輸入語言名稱" />
        </div>
        <div class="field">
          <label for="lang2-solo">語言 2</label>
          <select id="lang2-solo" onchange="toggleCustom('lang2-solo','custom-solo2')">
            <option value="">── 請選擇 ──</option>
            <option>中文（繁體）</option>
            <option>中文（簡體）</option>
            <option>English</option>
            <option>日本語</option>
            <option>한국어</option>
            <option>Français</option>
            <option>Deutsch</option>
            <option>Español</option>
            <option>Português</option>
            <option>ภาษาไทย</option>
            <option>Bahasa Indonesia</option>
            <option>Tiếng Việt</option>
            <option value="__other__">其他（自行輸入）</option>
          </select>
          <input type="text" id="custom-solo2" class="custom-input" placeholder="請輸入語言名稱" />
        </div>
        <button type="submit">確認設定</button>
      </form>

      <div id="msg" class="message"></div>
    </div>
  </div>

  <script>
    const LIFF_ID = "{{ liff_id }}";
    let contextType = "";
    let groupId = "";

    // LINE language code → dropdown option mapping
    const LANG_MAP = {
      "zh-TW": "中文（繁體）",
      "zh-CN": "中文（簡體）",
      "zh-Hant": "中文（繁體）",
      "zh-Hans": "中文（簡體）",
      "en": "English",
      "ja": "日本語",
      "ko": "한국어",
      "fr": "Français",
      "de": "Deutsch",
      "es": "Español",
      "pt": "Português",
      "th": "ภาษาไทย",
      "id": "Bahasa Indonesia",
      "vi": "Tiếng Việt",
    };

    function preselectLang(selectId, langCode) {
      if (!langCode) return;
      // Try exact match first, then prefix (e.g. "zh-TW" → "zh-TW", "en-US" → "en")
      const mapped = LANG_MAP[langCode] || LANG_MAP[langCode.split("-")[0]] || "";
      if (!mapped) return;
      const sel = document.getElementById(selectId);
      for (const opt of sel.options) {
        if (opt.text === mapped || opt.value === mapped) {
          sel.value = opt.value;
          break;
        }
      }
    }

    function toggleCustom(selectId, inputId) {
      const sel = document.getElementById(selectId);
      const inp = document.getElementById(inputId);
      if (sel.value === "__other__") {
        inp.classList.add("visible");
        inp.required = true;
      } else {
        inp.classList.remove("visible");
        inp.required = false;
        inp.value = "";
      }
    }

    function getLangValue(selectId, customId) {
      const sel = document.getElementById(selectId);
      if (sel.value === "__other__") {
        return document.getElementById(customId).value.trim();
      }
      return sel.value;
    }

    function showMsg(text, isError) {
      const el = document.getElementById("msg");
      el.textContent = text;
      el.className = "message " + (isError ? "error" : "ok");
    }

    async function submitGroup(e) {
      e.preventDefault();
      const lang = getLangValue("lang-group", "custom-group");
      if (!lang) { showMsg("請選擇或輸入語言", true); return; }
      await send({ context_type: "group", group_id: groupId, lang });
    }

    async function submitSolo(e) {
      e.preventDefault();
      const lang1 = getLangValue("lang1-solo", "custom-solo1");
      const lang2 = getLangValue("lang2-solo", "custom-solo2");
      if (!lang1 || !lang2) { showMsg("請選擇兩種語言", true); return; }
      await send({ context_type: "utou", lang1, lang2 });
    }

    async function send(payload) {
      const btn = document.querySelector("form:not([style*='none']) button[type='submit']");
      if (btn) btn.disabled = true;
      try {
        payload.id_token = liff.getIDToken();
        const res = await fetch("/api/liff/save", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        showMsg(data.message, data.status !== "ok");
        if (data.status === "ok") {
          if (liff.isInClient()) {
            setTimeout(() => liff.closeWindow(), 2000);
          }
        }
      } catch (err) {
        showMsg("發送失敗，請稍後再試。", true);
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const ctx = liff.getContext();
        contextType = ctx.type;
        groupId = ctx.groupId || ctx.roomId || "";

        // 取得語言代碼
        let userLang = ctx.language;
        if (!userLang && typeof liff.getLanguage === "function") {
          try {
            userLang = liff.getLanguage();
          } catch (e) {
            userLang = "";
          }
        }
        // DEBUG: 顯示 language 值
        console.log("LIFF context:", JSON.stringify(ctx));
        alert("language: " + userLang + " | type: " + ctx.type);

        const profile = await liff.getProfile();
        document.getElementById("avatar").src = profile.pictureUrl || "";
        document.getElementById("display-name").textContent = profile.displayName;

        document.getElementById("loading").style.display = "none";
        document.getElementById("app").style.display = "block";

        if (contextType === "group" || contextType === "room") {
          const form = document.getElementById("form-group");
          form.style.display = "block";
          form.addEventListener("submit", submitGroup);
          preselectLang("lang-group", userLang);
        } else {
          const form = document.getElementById("form-solo");
          form.style.display = "block";
          form.addEventListener("submit", submitSolo);
          preselectLang("lang1-solo", userLang);
        }
      } catch (err) {
        document.getElementById("loading").textContent = "初始化失敗：" + err.message;
      }
    }

    init();
  </script>
</body>
</html>
